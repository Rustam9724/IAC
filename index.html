<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:regular,700" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="js.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <div class="header__left">
                    <div class="header__logo"></div>
                    <div class="header__descriptor">Производство и продажа промышлнного оборудования</div>
                </div>
                <div class="header__right">
                    <div class="header__language-bar">
                        <span>RU</span>
                        <div class="header__arrow">
                            <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0.707031 0.949768L6.36389 6.60662M4.94967 6.60662L10.6065 0.949768" stroke="#00814F" stroke-width="2"/>
                            </svg>
                        </div>
                    </div>
                    <div class="header__burger-menu">
                        <div class="burger__band"></div>
                        <div class="burger__band"></div>
                        <div class="burger__band"></div>
                    </div>
                </div>
            </div>
        </header>
        <section class="first-screen">
            <div class="container">
                <div class="first-screen__info">
                    <div class="first-screen__main-info main-info">
                        <div class="main-info__heading">Промышленное оборудованиев<br> в странах СНГ с пожизненной гарантией</div>
                        <div class="main-info__sub-text">Оформите заказ и получите в подарок: запчасти,<br> средства по уходу или Kärcher</div>
                        <button class="main-info__button">ОФОРМИТЬ ЗАКАЗ</button>
                    </div>
                    <div class="first-screen__video">
                        <svg width="116" height="120" viewBox="0 0 116 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <ellipse opacity="0.15" cx="57.9587" cy="60" rx="57.9587" ry="60" fill="white"/>
                            <ellipse opacity="0.4" cx="57.9587" cy="60" rx="46.367" ry="48" fill="white"/>
                            <ellipse cx="57.9588" cy="60" rx="28.9793" ry="30" fill="white"/>

                        </svg>
                    </div>
                </div>
                <svg width="30" height="85" viewBox="0 0 30 85" fill="none" xmlns="http://www.w3.org/2000/svg" class="first-screen__scroll">
                    <path d="M21.435 54.3639L14.3639 61.435M15.7781 61.435L8.70703 54.3639" stroke="#00814F" stroke-width="2"/>
                    <path d="M21.435 65.5061L14.3639 72.5772M15.7781 72.5772L8.70703 65.5061" stroke="#00814F" stroke-width="2"/>
                    <path d="M21.435 76.6482L14.3639 83.7193M15.7781 83.7193L8.70703 76.6482" stroke="#00814F" stroke-width="2"/>
                    <rect x="1" y="1" width="28" height="46" rx="13" stroke="#00814F" stroke-width="2"/>
                    <rect x="13.7998" y="12" width="2.4" height="8.4" rx="1.2" fill="#00814F"/>
                </svg>
            </div>
        </section>
    </div>
